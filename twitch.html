<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launegamer95 | Twitch</title>
    <style>
        /* 🧊 Dark Mode Minimalist 🌑 */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff; 
        }

        /* 🧭 Navigation ganz oben 🧭 */
        nav {
            background-color: #0a0a0a;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333333; 
            position: relative;
        }

        /* 📦 Unsichtbarer Container für das Menü */
        .hamburger-container {
            flex: 1;
            display: flex;
            align-items: center;
        }

        /* 🍔 Das eigentliche Menü-Symbol */
        .hamburger {
            font-size: 2em;
            color: #ffffff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* 🪄 Kein blauer Kasten! */
            user-select: none; 
            padding-right: 15px; 
        }

        /* 📦 Unsichtbarer Container für die Mitte */
        .logo-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 👑 Dein sauberer Logo-Text */
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px; 
            color: #ffffff;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent; /* 🪄 Kein blauer Kasten! */
            user-select: none;
        }

        .spacer {
            flex: 1;
        }

        /* 📦 Das aufklappbare Menü */
        .nav-links {
            display: none;
            flex-direction: column;
            background-color: #0a0a0a;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            border-bottom: 1px solid #333333;
            z-index: 10;
        }

        .nav-links.active {
            display: flex;
        }

        .nav-links a {
            color: #888888; 
            text-decoration: none;
            padding: 15px;
            font-weight: normal; 
            text-align: center;
            border-top: 1px solid #1a1a1a;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ffffff; 
        }
        
        /* 🚂 Die schlichten Header für Unterseiten 🚂 */
        .subpage-hero {
            text-align: center;
            padding: 15px 20px; 
            background-color: #111111; 
            /* 🟪 NEU: Eine lila Linie oben und unten, damit es wie ein Banner wirkt! */
            border-top: 5px solid #9146ff;
            border-bottom: 5px solid #9146ff; 
        }

        .subpage-hero h1 {
            font-size: 2.5em;
            margin: 0;
            color: #ffffff;
            /* 🔠 NEU: Die Schrift ist jetzt fett statt dünn (bold statt 300) */
            font-weight: bold; 
            letter-spacing: 2px; /* Etwas mehr Abstand macht fette Schrift noch edler */
        }


        /* 📦 Der Inhaltsbereich 📦 */
        .content-area {
            padding: 50px 20px;
            text-align: center;
            min-height: 400px;
            background-color: #0a0a0a;
        }

        .content-area h2 {
            color: #ffffff;
            font-weight: 300;
            font-size: 2em;
        }

        .content-area p {
            font-size: 1.2em;
            color: #888888;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        /* 🟪 Der Twitch Button (Falls du ihn auf der Twitch-Seite brauchst!) 🟪 */
        .btn-twitch {
            background-color: #9146ff; 
            color: #ffffff;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-twitch:hover {
            background-color: #772ce8; 
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="hamburger-container">
                <div class="hamburger" onclick="toggleMenu()">☰</div>
            </div>
            
            <div class="logo-container">
                <a href="index.html" class="logo">Launegamer95</a>
            </div>
            
            <div class="spacer"></div>
            
            <div class="nav-links" id="navMenu">
                <a href="twitch.html">Twitch</a>
                <a href="youtube.html">YouTube</a>
                <a href="tiktok.html">TikTok</a>
                <a href="minecraft.html">Minecraft</a>
                <a href="discord.html">Discord</a>
            </div>
        </nav>
    </header>

    <section class="subpage-hero">
        <h1>Twitch</h1>
    </section>

    <section class="content-area">
        <h2>Hier entsteht etwas Großes! 🚧</h2>
        <p>Der Inhalt für diese Seite wird bald mit coolen Clips, Infos und Bildern gefüllt!</p>
        
        </section>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("navMenu");
            menu.classList.toggle("active");
        }
    </script>

</body>
</html>
